<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturitní Zkoušedlo</title>
    <style>
        /* Vycentrování celého obsahu */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0;
            display: flex;
            justify-content: center; /* Horizontální centr */
            align-items: center;    /* Vertikální centr */
            min-height: 100vh;      /* Přes celou výšku displeje */
            padding: 20px;          /* Menší padding pro mobily */
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%;            /* Na mobilu přes celou šířku... */
            max-width: 450px;       /* ...ale na PC se zastaví na 450px */
        }

        /* Lepší čitelnost na mobilu */
        h1 { font-size: 1.5rem; text-align: center; margin-top: 0; }
        
        .input-group { margin: 15px 0; display: flex; flex-direction: column; }
        
        input { 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            margin-top: 5px; 
            font-size: 16px; /* Prevence automatického zoomu na iPhone */
        }

        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #0056b3; }
        
        /* Styl pro dynamické vstupy, aby nebyly nalepené na sobě */
        #dynamicInputs input {
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .correct { border: 2px solid #28a745; background-color: #d4edda; }
        .wrong { border: 2px solid #dc3545; background-color: #f8d7da; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Maturitní test</h1>
        <div class="input-group">
            <label>Zadejte číslo otázky:</label>
            <input type="number" id="questionPicker" placeholder="např. 5">
            <button onclick="generujPolicka()" style="margin-top: 10px;">Vygenerovat test</button>
        </div>

        <hr>

        <h3 id="displayTopic" style="text-align: center;">Vyberte otázku výše</h3>
        <div id="dynamicInputs"></div>
        
        <button id="submitBtn" style="display:none; margin-top: 20px; width: 100%;" onclick="zkontrolujOdpovedi()">Odeslat ke kontrole</button>
        <p id="resultMsg" style="text-align: center; font-weight: bold;"></p>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
